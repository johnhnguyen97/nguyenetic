<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <path id="orbit-path" d="M -52 0 A 52 22 0 1 0 52 0 A 52 22 0 1 0 -52 0" fill="none"/>
  </defs>
  <rect width="120" height="120" rx="24" fill="#080618"/>
  <ellipse cx="60" cy="60" rx="52" ry="22" fill="none" stroke="#FF8A3D" stroke-width="5" transform="rotate(-30 60 60)"/>
  <!-- Back satellite: under the N, visible during far/top half (0.5–1.0) -->
  <g transform="translate(60 60) rotate(-30)">
    <circle r="8" fill="#FF8A3D" opacity="0">
      <animateMotion dur="14s" repeatCount="indefinite">
        <mpath href="#orbit-path"/>
      </animateMotion>
      <animate attributeName="opacity" dur="14s" repeatCount="indefinite" values="0;0;1;1" keyTimes="0;0.5;0.5;1"/>
    </circle>
  </g>
  <text x="60" y="84" text-anchor="middle" font-family="'Instrument Serif', Georgia, 'Times New Roman', serif" font-size="82" font-style="italic" fill="#F5F0E8" font-weight="400">N</text>
  <!-- Front satellite: above the N, visible during near/bottom half (0.0–0.5) -->
  <g transform="translate(60 60) rotate(-30)">
    <circle r="8" fill="#FF8A3D">
      <animateMotion dur="14s" repeatCount="indefinite">
        <mpath href="#orbit-path"/>
      </animateMotion>
      <animate attributeName="opacity" dur="14s" repeatCount="indefinite" values="1;1;0;0" keyTimes="0;0.5;0.5;1"/>
    </circle>
  </g>
</svg>
